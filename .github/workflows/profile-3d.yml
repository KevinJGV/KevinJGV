name: GitHub-Profile-3D-Contrib

on:
  schedule: # 18:00 UTC diario (hora de bajo tráfico)
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add profile-3d-contrib/
          git diff --quiet --cached && { echo "sin cambios"; exit 0; }
          git commit -m "chore(profile): actualizar grafo de contribuciones 3D"
          # push resiliente a carreras con el workflow del snake (rebase + reintentos)
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "reintento $i (carrera de push)"; sleep $((RANDOM % 4 + 2))
          done
          echo "push falló tras reintentos"; exit 1
